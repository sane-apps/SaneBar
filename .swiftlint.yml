# SaneBar SwiftLint configuration

disabled_rules:
  - trailing_whitespace
  - todo
  - identifier_name
  - line_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - nesting
  - shorthand_operator

file_length:
  warning: 800
  error: 1000

opt_in_rules:
  - empty_count
  - empty_string
  - force_cast
  - force_try

force_cast: error
force_try: error

excluded:
  - Carthage
  - Pods
  - DerivedData
  - .build
  - .worktrees
  - .swiftpm
  - SourcePackages
  - Tests
  - Scripts
  - scripts
  - build
  - infra
  - vendor
  - node_modules
  # Legacy oversized files pending extraction into smaller units.
  - UI/Settings/GeneralSettingsView.swift
  - UI/SearchWindow/SecondMenuBarView.swift
  - Core/Controllers/StatusBarController.swift
  - Core/Services/AccessibilityService+Scanning.swift
