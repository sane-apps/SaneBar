public_posting_policy:
  approval_required: true
  disclosure_required: "Always say 'I built SaneBar' when recommending it publicly."

launch_package:
  status: "targeted_only_not_broad_launch"
  audience: "Mac users actively looking for a Bartender/Ice/menu bar manager alternative."
  problem: "Mac menu bars get crowded, existing tools can feel fragile or unclear, and privacy-sensitive icons deserve protection."
  solution: "SaneBar hides, searches, locks, and organizes menu bar icons with Touch ID lock, Browse Icons, Second Menu Bar, Smart Triggers, and one-time Pro pricing."
  primary_story: "A privacy-first menu bar manager with a uniquely strong Touch ID/security angle."
  pricing_proof: "Website shows Basic free and Pro $14.99 once; structured download URL points to the free ZIP and Buy Pro points to Lemon Squeezy."
  privacy_proof: "Privacy page states menu bar contents and personal files are not uploaded; network use is limited to updates, direct license checks, and simple anonymous counts."
  proof_assets:
    - type: "website_hero"
      status: "current"
      path: "docs/index.html"
    - type: "og_image"
      status: "current"
      path: "docs/images/og-image.png"
    - type: "product_screenshot"
      status: "current"
      path: "docs/images/second-menu-bar-live.png"
    - type: "product_screenshot"
      status: "current"
      path: "docs/images/icon-panel-live.png"
  channel_plan:
    product_hunt: "no_go_until_major_release_story"
    hacker_news: "no_go_until_major_release_story"
    x_replies: "targeted_only_when_user_asks_for_menu_bar_alternative"
    directories: "maintenance_only"
  go_no_go:
    rule: "No broad public launch until a major release story exists and current support noise is stable."
    next_trigger: "Visible v2.2/v3 workflow change, new Touch ID/security story, or strong user proof."
  weak_launch_blockers:
    - "Already launched on Product Hunt/HN; a repost without a major new story would look weak."
    - "Open support issues remain around layout stability and icon movement; do not amplify broadly until the current patch is stable."

