# --- KNOWN FACTS (don't re-explain these) ---
known_facts:
  - "Lemon Squeezy delivers downloads directly on purchase page. Bounced emails are NOT a problem — customers already have their download. Many use throwaway emails for privacy."
  - "SaneBar is unsandboxed (Accessibility API requires it). Distribution is DMG, not Mac App Store."
  - "GitHub releases are public — use Cloudflare R2 (dist.sanebar.com) for gated downloads."
  - "Sparkle handles auto-updates via appcast.xml on sanebar.com (GitHub Pages)."
  - "Touch ID lock is the #1 unique feature. No competitor has it."

