---
version: 1
app: SaneBar
require_standard_runtime_state_matrix: true
runtime_state_matrix:
  upgrade_update:
    why: Customers can only recover from a regression if a fresh install and an upgrade from the prior public build both serve and run the intended version.
    action_ids:
    - startup-wake-appearance-recovery
    - license-about-support-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - state_receipt
    - log
    runner: Scripts/live_zone_smoke.rb plus release_preflight
  cold_launch_relaunch:
    why: New users hit launch, quit, Dock relaunch, and single-instance behavior before they can use any feature.
    action_ids:
    - startup-wake-appearance-recovery
    - status-item-click-routes
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - screenshot
    - state_receipt
    runner: Scripts/live_zone_smoke.rb
  wake_unlock:
    why: Menu bar geometry and app state can drift after wake or unlock even when a normal launch looked correct.
    action_ids:
    - startup-wake-appearance-recovery
    - appearance-customization-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - screenshot
    - log
    runner: Scripts/live_zone_smoke.rb
  display_topology:
    why: External display, notch, and width changes are common customer setups and have caused stale menu-bar placement before.
    action_ids:
    - startup-wake-appearance-recovery
    - browse-icons-search-navigation
    - browse-icons-icon-context-actions
    - appearance-customization-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - screenshot
    - state_receipt
    runner: Scripts/live_zone_smoke.rb
  wake_visible_zone_persistence:
    why: Wake and screen-saver recovery can leave SaneBar anchors healthy while customer-visible third-party icons drift from Visible to Hidden after delayed reconciliation.
    action_ids:
    - startup-wake-appearance-recovery
    - browse-icons-icon-context-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - screenshot
    - log
    runner: Scripts/wake_layout_probe.rb visible-zone snapshots after wake
    required_scenarios:
    - baseline visible icon-zone snapshot before display sleep
    - fresh authoritative icon-zone snapshot at 1s after wake
    - fresh authoritative icon-zone snapshot at 5s after wake
    - fresh authoritative icon-zone snapshot at 15s after wake
    - visible required IDs remain visible and are not moved into Hidden or Always Hidden
    - hidden required IDs remain hidden and are not moved into Visible or Always Hidden
  dynamic_helper_wake_drift:
    why: Helper-owned menu extras such as Lungo can drift across wake/display replay even when stable Apple extras and SaneBar anchors look correct.
    action_ids:
    - startup-wake-appearance-recovery
    - browse-icons-icon-context-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - screenshot
    - log
    - state_receipt
    runner: Scripts/wake_layout_probe.rb helper-specific visible-zone snapshots after wake
    required_scenarios:
    - dynamic helper required IDs are present before wake
    - dynamic helper required IDs remain in intended zones after wake
    - helper-specific Hidden to Visible drift is rejected as a release blocker
  shared_bundle_exact_id_moves:
    why: Move bugs only count as release-proven when the notched MacBook Air drives the real Icon Panel ingress with deterministic SBF fixtures; AppleScript move commands observe a different path.
    action_ids:
    - startup-wake-appearance-recovery
    - browse-icons-icon-context-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - air_runtime
    - log
    - screenshot
    - state_receipt
    runner: manual notched-Mac runtime pass (the historical air_ir_test.sh harness was retired with the sunset)
    required_scenarios:
    - real app ingress used sane_test launch, hotkey, click, right-click menu, and drag tile
    - menu move Hidden to Visible changed authoritative zone
    - menu move Visible to Always Hidden changed authoritative zone
    - menu move Always Hidden to Hidden changed authoritative zone
    - drag move Visible to Hidden changed authoritative zone
    - drag move Hidden to Always Hidden changed authoritative zone
    - drag move Always Hidden to Visible changed authoritative zone
  hover_auto_rehide:
    why: Hover reveal and delayed auto-rehide are timing-sensitive customer flows that source guards and screenshots do not exercise.
    action_ids:
    - control-settings-actions
    - startup-wake-appearance-recovery
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_click
    - mini_runtime
    - log
    - state_receipt
    runner: Mini hover/auto-rehide runtime probe
    required_scenarios:
    - hover reveal opens hidden items
    - leaving the reveal zone auto-rehides after the configured delay
    - repeated hover cycles do not leave stale visible items
  license_clipboard_paste:
    why: A license field can render correctly while failing real paste/focus activation, which blocks paid conversion.
    action_ids:
    - license-about-support-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_click
    - screenshot
    - log
    - state_receipt
    runner: Mini license clipboard paste runtime probe
    required_scenarios:
    - license sheet accepts clipboard paste into the key field
    - Activate uses the pasted value instead of an empty or stale field
    - invalid test key shows a visible validation result without dismissing the sheet
  resource_soak_growth:
    why: A same-candidate adaptive sentinel catches obvious scanner, observer, or helper growth without blocking normal release iteration.
    action_ids:
    - startup-wake-appearance-recovery
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_runtime
    - log
    - state_receipt
    runner: SaneMaster Mini adaptive resource check
    required_scenarios:
    - adaptive Mini resource check passed for this release build
    - average CPU remains within idle budget
    - RSS and physical footprint do not grow beyond the short-soak release budget
    - raw current-build resource soak artifact and log references exist
    - per-sample CPU/RSS/physical footprint trend fields were captured
  basic_pro_mode:
    why: The same customer action must either work in Pro or clearly gate in Basic without pretending the change succeeded.
    action_ids:
    - onboarding-basic-pro-permission-actions
    - pro-basic-gating-actions
    - license-about-support-actions
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_click
    - screenshot
    - log
    runner: Scripts/customer_ui_action_sweep.rb
  support_report_media:
    why: Customers rely on in-app reports when the app is broken, including large videos that cannot travel as normal email attachments.
    action_ids:
    - license-about-support-actions
    - health-repair-rescue-diagnostics
    required_proof_level: full_runtime_completion
    required_evidence_types:
    - mini_click
    - screenshot
    - log
    runner: Scripts/customer_ui_action_sweep.rb support/report media path
actions:
- id: status-item-click-routes
  title: Status item left, right, and option-click routes are live
  surfaces:
  - Menu bar status items
  - SaneBar separator item
  steps:
  - Launch the signed release-like build on the Mini.
  - "Left-click the SaneBar menu bar item with both left-click modes: toggle hidden
    items and open Browse Icons."
  - Option-click the SaneBar menu bar item.
  - Right-click or control-click the SaneBar menu bar item.
  assertions:
  - Left-click toggles hidden icons or opens the configured Browse Icons surface.
  - Option-click always opens the Icon Panel Browse Icons surface.
  - Right-click opens the status menu without toggling hidden icons.
  - The separator stays before the main SaneBar item after each route.
  evidence:
  - Mini click transcript
  - Mini layout snapshot before and after click routes
  required_proof_level: full_runtime_completion
  required_evidence_types:
  - mini_click
  - screenshot
  - fixture
  historical_failure_classes:
  - context_menu_extension_missing
  - duplicate_or_stale_menu_item
  - menu_entry_missing
  - layout_visual_regression
  - state_count_drift
  - activation_noop
  functional_state:
    description: Seeded menu-bar fixture with representative visible, hidden, and
      always-hidden status items and saved SaneBar groups.
    setup_steps:
    - Launch release-like app on the Mini with the standard menu-bar fixture.
    - Restore fixture groups and icon zones before each destructive/move test.
    fixture_paths:
    - Tests/Fixtures/customer-ui/sanebar-menu-zones/
  user_inputs:
  - Launch the signed release-like build on the Mini.
  - '{"Left-click the SaneBar menu bar item with both left-click modes" => "toggle
    hidden items and open Browse Icons."}'
  - Option-click the SaneBar menu bar item.
  expected_outputs:
  - Left-click toggles hidden icons or opens the configured Browse Icons surface.
  - Option-click always opens the Icon Panel Browse Icons surface.
  - Right-click opens the status menu without toggling hidden icons.
