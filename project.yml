name: SaneBar
options:
  bundleIdPrefix: com.sanebar
  deploymentTarget:
    macOS: 15.0
  xcodeVersion: 16.0

configs:
  Debug: debug
  ProdDebug: debug
  ProdDebug-Setapp: debug
  Release: release
  Release-AppStore: release
  Release-Setapp: release

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.4.0
  Setapp:
    url: https://github.com/MacPaw/Setapp-framework.git
    from: 5.0.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.8.0
  SaneUI:
    url: https://github.com/sane-apps/SaneUI.git
    branch: main
settings:
  DEAD_CODE_STRIPPING: YES
  SWIFT_EMIT_LOC_STRINGS: YES
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  ENABLE_HARDENED_RUNTIME: YES
  GENERATE_INFOPLIST_FILE: YES
  # Recommended warnings
  CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
  CLANG_WARN_BOOL_CONVERSION: YES
  CLANG_WARN_COMMA: YES
  CLANG_WARN_CONSTANT_CONVERSION: YES
  CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
  CLANG_WARN_EMPTY_BODY: YES
  CLANG_WARN_ENUM_CONVERSION: YES
  CLANG_WARN_INFINITE_RECURSION: YES
  CLANG_WARN_INT_CONVERSION: YES
  CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
  CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
  CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
  CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
  CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
  CLANG_WARN_STRICT_PROTOTYPES: YES
  CLANG_WARN_SUSPICIOUS_MOVE: YES
  CLANG_WARN_UNREACHABLE_CODE: YES
  CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
  ENABLE_STRICT_OBJC_MSGSEND: YES
  GCC_NO_COMMON_BLOCKS: YES
  GCC_WARN_64_TO_32_BIT_CONVERSION: YES
  GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
  GCC_WARN_UNDECLARED_SELECTOR: YES
  GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
  GCC_WARN_UNUSED_FUNCTION: YES
  GCC_WARN_UNUSED_VARIABLE: YES
  SWIFT_STRICT_CONCURRENCY: complete

schemes:
  SaneBar:
    build:
      targets:
        SaneBar: all
        SaneBarTests: [test]
    test:
      targets:
        - SaneBarTests
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release

  SaneBarSetapp:
    build:
      targets:
        SaneBar: all
        SaneBarTests: [test]
    test:
      targets:
        - SaneBarTests
    profile:
      config: Release-Setapp
    run:
      config: ProdDebug-Setapp
    archive:
      config: Release-Setapp

targets:
  SaneBar:
    type: application
    platform: macOS
    bundleId: com.sanebar.app
    deploymentTarget:
      macOS: 15.0
    sources:
      - main.swift
      - SaneBarApp.swift
      - DirectDistributionSupport.swift
      - path: Core
        excludes:
          - "**/CLAUDE.md"
      - path: UI
        excludes:
          - "**/CLAUDE.md"
      - Resources
    dependencies:
      - package: KeyboardShortcuts
      - package: Setapp
      - package: Sparkle
      - package: SaneUI
    info:
      path: SaneBar/Info.plist
      properties:
        NSAppleScriptEnabled: true
        OSAScriptingDefinition: SaneBar.sdef
        NSAppleEventsUsageDescription: "SaneBar needs to control other applications to manage your menu bar items."
        NSAccessibilityUsageDescription: "SaneBar needs accessibility permissions to detect and manage menu bar items."
        CFBundleURLTypes:
          - CFBundleURLName: "com.sanebar.app"
            CFBundleURLSchemes:
              - "sanebar"
        LSApplicationCategoryType: "public.app-category.utilities"
        SUFeedURL: "https://sanebar.com/appcast.xml"
        SUEnableSystemProfiling: false
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "7Pl/8cwfb2vm4Dm65AByslkMCScLJ9tbGlwGGx81qYU="
    settings:
      base:
        PRODUCT_NAME: SaneBar
        PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.app
        MARKETING_VERSION: "2.1.34"
        CURRENT_PROJECT_VERSION: "2134"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: NO
        ENABLE_XOJIT_PREVIEWS: NO
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 15.0
        ARCHS: arm64
        VALID_ARCHS: arm64
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.dev
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          CODE_SIGN_ENTITLEMENTS: ""
        ProdDebug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.app
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneBar/SaneBar.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG PRODDEBUG"
        ProdDebug-Setapp:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.app-setapp
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneBar/SaneBar.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG PRODDEBUG SETAPP"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.app
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: SaneBar/SaneBar.entitlements
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.app
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          ENABLE_APP_SANDBOX: YES
          OTHER_SWIFT_FLAGS: "$(inherited) -D APP_STORE"
          APP_STORE_PRODUCT_ID: com.sanebar.app.pro.unlock
          INFOPLIST_KEY_AppStoreProductID: com.sanebar.app.pro.unlock
          CODE_SIGN_ENTITLEMENTS: SaneBar/SaneBar-AppStore.entitlements
        Release-Setapp:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanebar.app-setapp
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: SaneBar/SaneBar.entitlements
          OTHER_SWIFT_FLAGS: "$(inherited) -D SETAPP"
    postCompileScripts:
      - script: |
          export PATH="/opt/homebrew/bin:$PATH"
          if which swiftlint >/dev/null; then
            swiftlint . || true
          else
            echo "warning: SwiftLint not installed"
          fi
        name: Run SwiftLint
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: |
          if [ "$CONFIGURATION" == "ProdDebug-Setapp" ] || [ "$CONFIGURATION" == "Release-Setapp" ]; then
            echo "Setapp build: stripping Sparkle framework and direct-store keys..."
            rm -rf "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle.framework"
            /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :SUEnableAutomaticChecks" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :SUEnableSystemProfiling" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :AppStoreProductID" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :MPSupportedArchitectures" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :MPSupportedArchitectures array" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :MPSupportedArchitectures:0 string arm64" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Delete :NSUpdateSecurityPolicy" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy dict" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy:AllowProcesses dict" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy:AllowProcesses:MEHY5QF425 array" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy:AllowProcesses:MEHY5QF425:0 string com.setapp.DesktopClient.SetappAgent" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            SETAPP_KEY_SOURCE="${SRCROOT}/Setapp/setappPublicKey.pem"
            if [ -f "${SETAPP_KEY_SOURCE}" ]; then
              cp "${SETAPP_KEY_SOURCE}" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/setappPublicKey.pem"
              echo "Setapp build: bundled setappPublicKey.pem"
            else
              echo "warning: Setapp build missing ${SETAPP_KEY_SOURCE}"
            fi
            WEAKEN_SCRIPT="${SRCROOT}/../../infra/SaneProcess/scripts/weaken_sparkle.rb"
            if [ -f "${WEAKEN_SCRIPT}" ]; then
              find "${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}" -type f -path "*/Contents/MacOS/*" -print0 | \
                xargs -0 -I{} ruby "${WEAKEN_SCRIPT}" "{}" || exit 1
            fi
            echo "Setapp build: Sparkle removed, Setapp policy applied"
          fi
        name: Strip Sparkle for Setapp
        basedOnDependencyAnalysis: false

  SaneBarTests:
    type: bundle.unit-test
    platform: macOS
    bundleId: com.sanebar.appTests
    deploymentTarget:
      macOS: 15.0
    testTarget: SaneBar
    sources:
      - path: Tests
        excludes:
          - "**/CLAUDE.md"
    dependencies:
      - target: SaneBar
    settings:
      base:
        CODE_SIGN_STYLE: Manual
      configs:
        Debug:
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "-"
        ProdDebug-Setapp:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-Setapp:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
