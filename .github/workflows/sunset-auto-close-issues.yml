name: Sunset auto-close new issues

# SaneBar is sunset (macOS 27 "Golden Gate" breaks menu bar managers) and is now free +
# MIT, community-maintained. New ISSUES are auto-closed with a friendly note. Pull
# requests are NOT touched; this triggers on `issues` only, never on `pull_request`.

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "**Good news and bad news — and I'll give you the good news first.**",
              "",
              "Everything I'm about to say affects **SaneBar only.** None of the other SaneApps have been impacted by Apple's changes — they all work great, they are actively maintained, and they will keep working. You can see the whole family at [saneapps.com](https://saneapps.com).",
              "",
              "Now the bad news. **SaneBar — and every other menu bar manager on the Mac — has been rug-pulled by Apple.** This is not a SaneBar bug we were too lazy to fix. It is a platform problem, and it is hitting the whole category on **two fronts at once.**",
              "",
              "**1. The current version of macOS is already broken for menu bar managers.** The OS itself fights apps like this — it flips a menu bar item's visibility in a loop and rewrites menu bar order out from under the app — and there is **no public API** to control status items, so every app in this category is stuck with the same toolkit. That is why some issues — very possibly the one you just filed — **cannot be fixed at the app level today, on current macOS.** Apple has acknowledged pieces of it in Feedback **FB9052637** (toggling item visibility destroys the saved position) and **FB8732253** (macOS stopped preserving menu bar order).",
              "",
              "This is not unique to us — the identical bugs are open in other menu bar apps right now:",
              "- **Ice** (open source): [menu bar items move to hidden on their own](https://github.com/jordanbaird/Ice/issues/344), [always-hidden icons disappear](https://github.com/jordanbaird/Ice/issues/675)",
              "- **BetterDisplay**: [on macOS 26.4.1 the system drives an NSStatusItem visibility loop so the icon never appears](https://github.com/waydabber/BetterDisplay/issues/5314)",
              "",
              "**2. The next version of macOS makes it total.** macOS 27 \"Golden Gate\" rebuilds how the menu bar works and is already breaking every menu bar manager in the beta — right-click menus stop responding, and dragging an icon now triggers Mission Control instead of moving it. Straight from Apple:",
              "- **[Apple engineer + developer reports](https://developer.apple.com/forums/thread/832823)** — an Apple framework engineer states plainly: *\"Local event monitors are no longer the recommended way of scanning for events on status items.\"*",
              "- **[macOS 27 release notes](https://developer.apple.com/documentation/macos-release-notes/macos-27-release-notes)**",
              "- **[The broader AppKit discussion](https://developer.apple.com/forums/forums/topics/ui-frameworks-topic/ui-frameworks-topic-appkit)**",
              "",
              "So this was never for lack of trying. Apple moved the ground out from under the entire category — already, on today's macOS, and completely on the next one.",
              "",
              "SaneBar is not dead in spirit, though. As of the sunset it is **completely free and open source (MIT), community-maintained,** every feature unlocked. I am no longer triaging issues, but the door is wide open:",
              "- **[Fork the repo](https://github.com/sane-apps/SaneBar)** and fix what you need for your own setup",
              "- **If you have found a solution, open a pull request** — PRs still get reviewed and merged by real people",
              "- Read the **[full sunset write-up](https://github.com/sane-apps/SaneBar/releases/tag/sunset)** for the whole story and references",
              "",
              "Closing this out, but the code stays open. Thank you for caring enough to file it.",
              "",
              "**Mr. Sane**",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              state_reason: "not_planned",
            });
